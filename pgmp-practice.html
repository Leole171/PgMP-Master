<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PgMP Master — Daily Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #c8a96e;
    --accent2: #7b68ee;
    --green: #4ade80;
    --red: #f87171;
    --text: #e8e6f0;
    --muted: #7a7890;
    --correct: #052e16;
    --wrong: #2d0a0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .header-stats strong { color: var(--accent); }

  /* MAIN LAYOUT */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* DOMAIN TABS */
  .domain-nav {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .domain-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .domain-btn:hover { border-color: var(--accent); color: var(--accent); }
  .domain-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-bottom: 2rem;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    border-radius: 99px;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem 2.2rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
  }

  .q-domain-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .q-domain-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .q-number {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .q-text {
    font-size: 1.08rem;
    line-height: 1.7;
    color: var(--text);
    font-weight: 300;
    margin-bottom: 1.8rem;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.7rem; }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 0.95rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.93rem;
    color: var(--text);
    font-weight: 300;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(123,104,238,0.06);
  }
  .option-btn .opt-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent2);
    min-width: 20px;
    padding-top: 2px;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: var(--correct);
    color: var(--green);
  }
  .option-btn.correct .opt-letter { color: var(--green); }
  .option-btn.wrong {
    border-color: var(--red);
    background: var(--wrong);
    color: var(--red);
  }
  .option-btn.wrong .opt-letter { color: var(--red); }
  .option-btn:disabled { cursor: default; }

  /* EXPLANATION */
  .explanation {
    margin-top: 1.5rem;
    padding: 1.2rem 1.4rem;
    border-left: 3px solid var(--accent2);
    background: rgba(123,104,238,0.07);
    border-radius: 0 3px 3px 0;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .explanation h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent2);
    margin-bottom: 0.6rem;
  }
  .explanation p {
    font-size: 0.9rem;
    line-height: 1.7;
    color: #b8b6cc;
    font-weight: 300;
  }
  .explanation .ref {
    margin-top: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0.7rem 1.6rem;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-primary:hover { background: #d4ba7e; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn:disabled { opacity: 0.35; cursor: default; }

  /* SCORE PANEL */
  .score-panel {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .score-tile {
    flex: 1;
    min-width: 100px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1rem;
    text-align: center;
  }
  .score-tile .val {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .score-tile .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
  }
  .score-tile.green .val { color: var(--green); }
  .score-tile.red .val { color: var(--red); }
  .score-tile.gold .val { color: var(--accent); }
  .score-tile.purple .val { color: var(--accent2); }

  /* RESULTS SCREEN */
  #results-screen {
    display: none;
    text-align: center;
    padding: 3rem 0;
    animation: slideIn 0.4s ease;
  }
  #results-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  #results-screen p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  /* STREAK BADGE */
  .streak {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent);
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 99px;
    padding: 0.3rem 0.8rem;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .q-card { padding: 1.4rem 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Pg<span>MP</span> Master</div>
  <div class="header-stats">
    <span>Streak: <strong id="hdr-streak">0</strong>🔥</span>
    <span>Score: <strong id="hdr-score">0%</strong></span>
    <span id="hdr-domain-lbl" style="color:var(--accent)"></span>
  </div>
</header>

<main>
  <!-- SCORE PANEL -->
  <div class="score-panel">
    <div class="score-tile green">
      <div class="val" id="sc-correct">0</div>
      <div class="lbl">Correct</div>
    </div>
    <div class="score-tile red">
      <div class="val" id="sc-wrong">0</div>
      <div class="lbl">Wrong</div>
    </div>
    <div class="score-tile gold">
      <div class="val" id="sc-pct">—</div>
      <div class="lbl">Accuracy</div>
    </div>
    <div class="score-tile purple">
      <div class="val" id="sc-remaining">—</div>
      <div class="lbl">Remaining</div>
    </div>
  </div>

  <!-- DOMAIN FILTER -->
  <div class="domain-nav" id="domain-nav"></div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">Question 1 of —</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <!-- QUESTION AREA -->
  <div id="quiz-screen">
    <div class="q-card" id="q-card">
      <div class="q-domain-label" id="q-domain">Loading…</div>
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation" style="display:none">
        <h4>💡 Explanation</h4>
        <p id="exp-text"></p>
        <div class="ref" id="exp-ref"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-ghost" id="btn-prev" onclick="prevQ()">← Prev</button>
      <div class="streak" id="streak-badge">🔥 Streak: 0</div>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()">Next →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <h2 id="res-emoji">🎯</h2>
    <h2 id="res-title">Session Complete!</h2>
    <p id="res-subtitle"></p>
    <div class="score-panel" style="max-width:480px;margin:2rem auto;">
      <div class="score-tile green"><div class="val" id="res-correct">0</div><div class="lbl">Correct</div></div>
      <div class="score-tile gold"><div class="val" id="res-pct">0%</div><div class="lbl">Score</div></div>
      <div class="score-tile purple"><div class="val" id="res-streak">0</div><div class="lbl">Best Streak</div></div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top:1rem">Restart Practice</button>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════
//  QUESTION BANK — 60 original PgMP-style questions
// ═══════════════════════════════════════════════════
const QUESTIONS = [
  // ── DOMAIN 1: STRATEGIC PROGRAM MANAGEMENT ──
  {
    domain: "Strategic Program Management",
    text: "An organization's strategic plan changes mid-program, reducing the priority of your program's primary benefit. What is the BEST first action for the program manager?",
    options: [
      "Continue the program as planned since the charter has already been approved",
      "Reassess the program's alignment with the updated strategy and escalate to the program sponsor",
      "Immediately close the program to avoid wasting resources",
      "Request an emergency steering committee meeting to reallocate budget"
    ],
    correct: 1,
    explanation: "Program managers must continuously align programs with organizational strategy. When strategic priorities shift, the first step is to reassess alignment and engage the sponsor — not unilaterally continue or terminate. Escalation with analysis preserves governance integrity.",
    ref: "PMI Standard for Program Management — Strategic Alignment"
  },
  {
    domain: "Strategic Program Management",
    text: "During a program's definition phase, the program manager discovers that two component projects have overlapping deliverables. What should the program manager do FIRST?",
    options: [
      "Eliminate one of the component projects immediately",
      "Update the program roadmap and inform the governance board",
      "Conduct a dependency analysis and coordinate with component project managers to resolve the overlap",
      "Escalate the issue to the project sponsors of both components"
    ],
    correct: 2,
    explanation: "Dependency analysis is the correct starting point. The program manager's role is to identify, analyze, and coordinate inter-project dependencies before escalating or making structural decisions. This ensures an informed, collaborative resolution.",
    ref: "PMI Standard for Program Management — Program Integration Management"
  },
  {
    domain: "Strategic Program Management",
    text: "A program manager is asked to evaluate a proposed program before it begins. Which document BEST helps determine whether the program is strategically justified?",
    options: [
      "Program management plan",
      "Business case",
      "Program charter",
      "Benefits realization plan"
    ],
    correct: 1,
    explanation: "The business case is the primary document used to justify a program before it is formally authorized. It outlines the expected benefits, costs, risks, and strategic fit. The program charter is created after approval, and the program management plan comes later in planning.",
    ref: "PMI Standard for Program Management — Business Case"
  },
  {
    domain: "Strategic Program Management",
    text: "A program manager must balance short-term project deliverables with long-term organizational benefit realization. What framework BEST supports this balance?",
    options: [
      "Risk management plan",
      "Program roadmap",
      "Work breakdown structure",
      "Responsibility assignment matrix"
    ],
    correct: 1,
    explanation: "The program roadmap provides a high-level timeline linking program components to strategic milestones and benefit delivery over time. It helps program managers balance immediate outputs with long-term outcomes in alignment with organizational strategy.",
    ref: "PMI Standard for Program Management — Program Roadmap"
  },
  {
    domain: "Strategic Program Management",
    text: "Which of the following BEST defines the unique value a program manager adds compared to managing individual projects separately?",
    options: [
      "Ensuring each project is delivered on time and within budget",
      "Managing the interdependencies and optimizing collective benefits across projects",
      "Providing detailed technical guidance to project teams",
      "Allocating resources evenly across all component projects"
    ],
    correct: 1,
    explanation: "The program manager's unique value lies in managing interdependencies and realizing collective benefits that could not be achieved by projects managed independently. This is the core distinction between program and project management.",
    ref: "PMI Standard for Program Management — Program vs. Project Management"
  },
  {
    domain: "Strategic Program Management",
    text: "An organization wants to launch a digital transformation initiative spanning multiple business units. How should the program manager approach scope definition?",
    options: [
      "Define scope based solely on IT deliverables",
      "Use the strategic objectives and expected benefits to frame the program scope",
      "Copy the scope from a similar past program",
      "Let each business unit define its own scope independently"
    ],
    correct: 1,
    explanation: "Program scope should be derived from strategic objectives and the benefits the organization aims to achieve. Starting from outcomes — not outputs — ensures the program remains aligned with enterprise goals throughout its lifecycle.",
    ref: "PMI Standard for Program Management — Scope Definition"
  },

  // ── DOMAIN 2: PROGRAM LIFE CYCLE MANAGEMENT ──
  {
    domain: "Program Life Cycle Management",
    text: "A program is transitioning from the 'Delivery' phase to the 'Closure' phase. What is the MOST critical activity during this transition?",
    options: [
      "Releasing all project resources immediately",
      "Conducting a final risk assessment",
      "Verifying that all planned benefits have been transitioned to operations",
      "Archiving all program documentation"
    ],
    correct: 2,
    explanation: "Transitioning benefits to operations is the defining activity when moving to closure. Unless realized benefits are embedded into the receiving organization, the program's purpose is unfulfilled. Documentation and resource release follow this critical handoff.",
    ref: "PMI Standard for Program Management — Program Closure Phase"
  },
  {
    domain: "Program Life Cycle Management",
    text: "During the program definition phase, a program manager is developing a schedule for component projects. Which factor is MOST important to consider?",
    options: [
      "Individual project managers' preferences",
      "Interdependencies between components and their impact on benefit delivery",
      "Historical data from unrelated programs",
      "Stakeholder availability for status meetings"
    ],
    correct: 1,
    explanation: "Inter-component dependencies directly affect the sequence and timing of benefit delivery. Scheduling must account for how one project's output feeds another's input to avoid cascading delays. This is a core program-level concern not addressed at the project level.",
    ref: "PMI Standard for Program Management — Program Schedule Management"
  },
  {
    domain: "Program Life Cycle Management",
    text: "A component project within the program has been cancelled. What should the program manager do NEXT?",
    options: [
      "Immediately reallocate the cancelled project's budget to other components",
      "Assess the impact of the cancellation on program benefits and update the program plan accordingly",
      "Notify the PMO and wait for further instructions",
      "Reassign the project team to a new component project"
    ],
    correct: 1,
    explanation: "When a component is cancelled, the program manager must first assess the impact on overall program benefits and then update plans accordingly. Reallocation and reassignment are decisions that follow the impact analysis — acting on them first could misalign the program.",
    ref: "PMI Standard for Program Management — Component Transition"
  },
  {
    domain: "Program Life Cycle Management",
    text: "Which of the following BEST describes the purpose of a phase-gate review in program management?",
    options: [
      "To approve detailed project plans for each component",
      "To evaluate program health and determine whether to proceed, adjust, or terminate the program",
      "To assess individual project manager performance",
      "To update the program risk register"
    ],
    correct: 1,
    explanation: "Phase-gate reviews (also called governance reviews or tollgates) are formal decision points where the governance board assesses whether the program should continue, be adjusted, or stopped. They are not operational reviews but strategic go/no-go checkpoints.",
    ref: "PMI Standard for Program Management — Governance Reviews"
  },
  {
    domain: "Program Life Cycle Management",
    text: "A program manager needs to initiate a new component project to address an emerging strategic need. What is the FIRST step?",
    options: [
      "Hire a project manager for the new component",
      "Update the program roadmap and seek governance approval",
      "Develop a detailed project plan",
      "Identify resource requirements for the new component"
    ],
    correct: 1,
    explanation: "Before initiating a new component, the program manager must update the program roadmap to reflect the new component's fit and obtain governance approval. Hiring, planning, and resourcing come after the strategic and governance process is followed.",
    ref: "PMI Standard for Program Management — Component Initiation"
  },
  {
    domain: "Program Life Cycle Management",
    text: "At which phase of the program life cycle is the benefits realization plan FIRST created?",
    options: [
      "Program delivery phase",
      "Program closure phase",
      "Program definition phase",
      "Pre-program setup"
    ],
    correct: 2,
    explanation: "The benefits realization plan is created during the program definition phase as part of planning how benefits will be identified, quantified, tracked, and transitioned. Creating it during delivery or closure would be too late to guide execution effectively.",
    ref: "PMI Standard for Program Management — Benefits Realization Planning"
  },

  // ── DOMAIN 3: BENEFITS MANAGEMENT ──
  {
    domain: "Benefits Management",
    text: "A program sponsor insists on adding a new feature that would delight end users but has no clear link to any defined program benefit. What should the program manager do?",
    options: [
      "Approve the feature since the sponsor requested it",
      "Reject the feature to protect the program scope",
      "Evaluate whether the feature can be linked to a program benefit; if not, escalate to governance",
      "Defer the feature to a future program phase"
    ],
    correct: 2,
    explanation: "Program managers must ensure all additions can be traced to defined benefits. If the feature cannot be justified through benefit alignment, the governance board — not the program manager alone — should decide. Unilateral rejection or approval bypasses proper governance.",
    ref: "PMI Standard for Program Management — Benefits Identification"
  },
  {
    domain: "Benefits Management",
    text: "Which metric is MOST useful for measuring whether a program is on track to deliver its intended benefits?",
    options: [
      "Cost performance index (CPI)",
      "Benefits realization rate against the benefits register",
      "Number of milestones completed",
      "Schedule variance (SV)"
    ],
    correct: 1,
    explanation: "Tracking the benefits realization rate against the benefits register directly measures progress toward program outcomes. CPI and SV measure project-level efficiency, and milestone counts are output-focused. Programs are defined by their outcomes — not their outputs.",
    ref: "PMI Standard for Program Management — Benefits Monitoring"
  },
  {
    domain: "Benefits Management",
    text: "A program is delivering on time and within budget, but stakeholders are dissatisfied. What is the MOST likely root cause?",
    options: [
      "Poor project management practices",
      "Benefits were not clearly defined or communicated during planning",
      "The program schedule was too aggressive",
      "The program sponsor was not engaged"
    ],
    correct: 1,
    explanation: "Delivering on time and on budget but failing to satisfy stakeholders often signals a benefits definition or communication gap. If expected outcomes were not clearly articulated and agreed upon, delivery of outputs alone cannot create stakeholder satisfaction.",
    ref: "PMI Standard for Program Management — Benefits Planning"
  },
  {
    domain: "Benefits Management",
    text: "When should the benefits realization plan be updated?",
    options: [
      "Only at the start of the program",
      "Only during phase-gate reviews",
      "Continuously throughout the program as conditions change",
      "Only when a benefit is fully realized"
    ],
    correct: 2,
    explanation: "The benefits realization plan is a living document. It must be updated continuously as market conditions, stakeholder needs, and program circumstances evolve. Treating it as a static artifact undermines the program's ability to adapt and deliver sustained value.",
    ref: "PMI Standard for Program Management — Benefits Realization Planning"
  },
  {
    domain: "Benefits Management",
    text: "Which of the following is an example of a 'sustained benefit' in program management?",

// ─── STATE ───
let filtered = [...QUESTIONS];
let currentIdx = 0;
let answered = {};
let correctCount = 0;
let wrongCount = 0;
let streak = 0;
let bestStreak = 0;
let activeFilter = 'All';

const DOMAINS = ['All', 'Strategic Program Management', 'Program Life Cycle Management',
                 'Benefits Management', 'Stakeholder Engagement', 'Governance'];

// ─── INIT ───
function init() {
  buildDomainNav();
  renderScores();
  renderQuestion();
}

function buildDomainNav() {
  const nav = document.getElementById('domain-nav');
  nav.innerHTML = '';
  DOMAINS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'domain-btn' + (d === activeFilter ? ' active' : '');
    btn.textContent = d === 'All' ? '🌐 All' :
      d === 'Strategic Program Management' ? '🎯 Strategic' :
      d === 'Program Life Cycle Management' ? '🔄 Life Cycle' :
      d === 'Benefits Management' ? '💎 Benefits' :
      d === 'Stakeholder Engagement' ? '🤝 Stakeholders' : '🏛️ Governance';
    btn.onclick = () => setFilter(d);
    nav.appendChild(btn);
  });
}

function setFilter(domain) {
  activeFilter = domain;
  filtered = domain === 'All' ? [...QUESTIONS] : QUESTIONS.filter(q => q.domain === domain);
  currentIdx = 0;
  answered = {};
  correctCount = 0;
  wrongCount = 0;
  streak = 0;
  buildDomainNav();
  renderScores();
  renderQuestion();
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';
}

// ─── RENDER QUESTION ───
function renderQuestion() {
  if (currentIdx >= filtered.length) {
    showResults();
    return;
  }

  const q = filtered[currentIdx];
  const card = document.getElementById('q-card');

  // Force re-animation
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  document.getElementById('q-domain').textContent = q.domain;
  document.getElementById('q-number').textContent = `Question ${currentIdx + 1} of ${filtered.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('hdr-domain-lbl').textContent = activeFilter !== 'All' ? activeFilter : '';

  // Options
  const optWrap = document.getElementById('options');
  optWrap.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    optWrap.appendChild(btn);
  });

  // Explanation
  document.getElementById('explanation').style.display = 'none';

  // If already answered
  const prev = answered[currentIdx];
  if (prev !== undefined) {
    applyAnswerUI(prev, q.correct, q.explanation, q.ref);
  }

  updateProgress();
  updateStreakBadge();

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent =
    currentIdx === filtered.length - 1 ? 'Finish 🎓' : 'Next →';
}

function selectAnswer(selectedIdx) {
  if (answered[currentIdx] !== undefined) return;

  const q = filtered[currentIdx];
  answered[currentIdx] = selectedIdx;

  if (selectedIdx === q.correct) {
    correctCount++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    wrongCount++;
    streak = 0;
  }

  applyAnswerUI(selectedIdx, q.correct, q.explanation, q.ref);
  renderScores();
  updateStreakBadge();
}

function applyAnswerUI(selected, correct, explanation, ref) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    if (i === selected && selected !== correct) btn.classList.add('wrong');
  });

  document.getElementById('exp-text').textContent = explanation;
  document.getElementById('exp-ref').textContent = '📖 ' + ref;
  document.getElementById('explanation').style.display = 'block';
}

// ─── NAVIGATION ───
function nextQ() {
  if (currentIdx < filtered.length - 1) {
    currentIdx++;
    renderQuestion();
  } else {
    showResults();
  }
}

function prevQ() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
  }
}

// ─── SCORES ───
function renderScores() {
  document.getElementById('sc-correct').textContent = correctCount;
  document.getElementById('sc-wrong').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) + '%' : '—';
  document.getElementById('sc-pct').textContent = pct;
  document.getElementById('sc-remaining').textContent = filtered.length - Object.keys(answered).length;
  document.getElementById('hdr-score').textContent = pct;
}

function updateProgress() {
  const done = Object.keys(answered).length;
  const total = filtered.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Question ${currentIdx + 1} of ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';
}

function updateStreakBadge() {
  document.getElementById('streak-badge').textContent = `🔥 Streak: ${streak}`;
  document.getElementById('hdr-streak').textContent = streak;
}

// ─── RESULTS ───
function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';

  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;

  let emoji = pct >= 75 ? '🏆' : pct >= 60 ? '💪' : '📚';
  let message = pct >= 75 ? 'PgMP-Ready Performance!' : pct >= 60 ? 'Good Progress — Keep Studying!' : 'More Practice Needed';

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = message;
  document.getElementById('res-subtitle').textContent =
    `You answered ${correctCount} of ${total} questions correctly.`;
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-streak').textContent = bestStreak;
}

function restartQuiz() {
  currentIdx = 0;
  answered = {};
  correctCount = 0;
  wrongCount = 0;
  streak = 0;
  bestStreak = 0;
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';
  renderScores();
  renderQuestion();
}

// ─── START ───
window.onload = init;
</script>
</body>
</html>
